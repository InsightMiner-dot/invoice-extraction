{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>🚀 Batch Extraction Suite</h2>
    <form id="uploadForm">
        <input type="file" id="pdfFiles" name="files" multiple accept="application/pdf" required style="margin-bottom: 15px; display: block;">
        <button type="submit" class="primary" id="extractBtn">Start Extraction</button>
    </form>
    <div id="loader" class="loader">⏳ Processing documents via Azure OpenAI... Please wait.</div>
</div>

<div class="card" id="resultsCard" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>Extraction Results</h3>
        <a id="downloadExcelBtn" href="#" style="display: none;">
            <button class="primary" style="background-color: #27ae60;">📥 Download Excel</button>
        </a>
    </div>
    <table id="resultsTable">
        <thead>
            <tr>
                <th>File Name</th>
                <th>Standardized Vendor</th>
                <th>Proc Time</th>
                <th>QC Status</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
{% endblock %}
